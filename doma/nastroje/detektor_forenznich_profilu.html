<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detektor forenzních profilů · Chceš myš?</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1b1a;
            --surface: #282422;
            --text: #d6cfc7;
            --text-dim: #8a8279;
            --accent: #8b3a3a;
            --accent-light: #b05a5a;
            --gold: #b8995c;
            --border: #38332e;
            --border-hi: #4a433d;
            --serif: 'Lora', Georgia, serif;
            --sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: var(--sans); font-size: 14px; line-height: 1.7;
            -webkit-font-smoothing: antialiased; padding: 2rem 1.5rem;
            max-width: 900px; margin: 0 auto;
        }
        h1 { font-family: var(--serif); font-size: 1.9rem; font-weight: 400; border-left: 4px solid var(--accent); padding-left: 1rem; margin-bottom: 0.4rem; }
        .sub { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 1.8rem; }
        textarea {
            width: 100%; padding: 1rem; font-family: 'Courier New', monospace;
            font-size: 0.9rem; border: 1px solid var(--border); background: var(--surface);
            color: var(--text); resize: vertical; min-height: 180px; border-radius: 6px;
        }
        textarea:focus { outline: none; border-color: var(--accent-light); }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        button {
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
            padding: 0.5rem 1.2rem; font-size: 0.8rem; border-radius: 4px; cursor: pointer;
            font-family: var(--sans); transition: all 0.15s;
        }
        button:hover { border-color: var(--accent-light); color: var(--accent-light); }
        button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        button.primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
        #resultsPanel { margin-top: 1.5rem; display: none; }
        .figure-summary {
            background: var(--surface); border: 1px solid var(--border);
            padding: 1rem; border-radius: 6px; margin-bottom: 1.2rem; font-size: 0.8rem;
        }
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 1rem 0; }
        @media(max-width:600px) { .profile-grid { grid-template-columns: 1fr; } }
        .profile-card {
            background: var(--surface); border: 1px solid var(--border); padding: 1rem;
            border-radius: 6px; transition: border-color 0.15s;
        }
        .profile-card.active { border-left: 4px solid var(--accent); background: #2a2220; }
        .profile-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem; }
        .profile-desc { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.4rem; }
        .confidence {
            font-size: 0.68rem; display: inline-block; padding: 0.1rem 0.5rem;
            border-radius: 20px; background: var(--border);
        }
        .confidence-high { background: var(--accent); color: #fff; }
        .confidence-medium { background: #5a4a3a; color: #e0d0b0; }
        .confidence-low { background: #38332e; color: #8a8279; }
        .warning-icon { font-size: 1.1rem; color: var(--accent-light); }
        .warning-box {
            padding: 0.8rem; border-radius: 6px; margin-top: 1rem; font-size: 0.82rem;
        }
        footer {
            margin-top: 2.5rem; padding-top: 1.2rem; border-top: 1px solid var(--border);
            font-size: 0.72rem; color: var(--text-dim); text-align: center;
        }
        footer a { color: var(--gold); }
    </style>
</head>
<body>

    <h1>Detektor forenzních profilů</h1>
    <div class="sub">Analýza jedné výpovědi — kombinace Myších klíčů odhaluje rizikové profily s varováním a stupněm jistoty. Plně offline.</div>

    <textarea id="inputText" placeholder="Vložte text výpovědi, přepis, email…"></textarea>
    <div class="btn-group">
        <button id="analyzeBtn" class="primary">Spustit analýzu</button>
        <button id="clearBtn">Smazat text</button>
    </div>

    <div id="resultsPanel">
        <div class="figure-summary" id="figureSummary"></div>
        <div class="profile-grid" id="profileGrid"></div>
        <div id="warningMsg"></div>
    </div>

    <footer>
        Nástroj pracuje s 12 Myšími klíči. Interpretace je vždy na vás. Výstupy nejsou důkazem.
        <br>Chceš myš? · © 2026 Michaela Nováková · <a href="mailto:chcesmys@gmail.com">chcesmys@gmail.com</a>
    </footer>

<script>
    // ============================================================
    // 1. M Y Š Í  K L Í Č E  (12 jazykových poruch)
    // ============================================================
    const MOUSE_KEYS = [
        { id: 'opakovani', name: 'Opakování', weight: 0.5, detect: (t, s, w) => {
            const freq = {}; w.forEach(wd => { if(wd.length>3) freq[wd]=(freq[wd]||0)+1; });
            return Object.values(freq).filter(c => c >= 3).length > 0 ? [Math.min(3, Object.values(freq).filter(c=>c>=3).length) + '×'] : [];
        }},
        { id: 'preskok', name: 'Přeskok', weight: 0.8, detect: (t, s) => {
            let skips = 0;
            for(let i=1; i<s.length; i++) {
                const prev = s[i-1].toLowerCase(), curr = s[i].toLowerCase();
                if((prev.includes('?') && !curr.match(/^(ano|ne|protože|ale|tak|no|jo)/i)) ||
                   (prev.match(/^(kde|kam|kdy|proč|jak|co|kdo)\b/i) && !curr.match(/^(protože|v|na|u|před|za|do|k)/i))) skips++;
            }
            return skips > 0 ? [skips + '×'] : [];
        }},
        { id: 'fixace', name: 'Fixace', weight: 0.5, detect: (t, s, w) => {
            const repeated = []; const freq = {};
            w.forEach(wd => { if(wd.length>3) freq[wd]=(freq[wd]||0)+1; });
            Object.entries(freq).filter(([k,v])=>v>=3).forEach(([k,v])=>repeated.push(k));
            return repeated.length > 0 ? [repeated.join(', ')] : [];
        }},
        { id: 'ztrata_souseda', name: 'Ztráta souseda', weight: 0.6, detect: (t, s) => {
            let orphan = 0;
            for(let i=1; i<s.length-1; i++) {
                const words = s[i].split(/\s+/).length;
                if(words <= 3 && s[i].length < 40 && !s[i].match(/^(a|ale|však|i|nebo|protože|tak|takže|když|aby)\b/i)) orphan++;
            }
            return orphan > 0 ? [orphan + '×'] : [];
        }},
        { id: 'pretrzeni', name: 'Přetržení', weight: 0.9, detect: (t, s) => {
            const broken = s.filter(si => si.trim().endsWith('…') || si.trim().endsWith('...') || si.trim().endsWith('no nic') || si.trim().endsWith('to je jedno'));
            return broken.length > 0 ? [broken.length + '×'] : [];
        }},
        { id: 'posun_kontextu', name: 'Posun kontextu', weight: 0.5, detect: (t, s) => {
            const shifts = s.filter(si => /\b(mimochodem|co se týče|ostatně|jinak|ale jinak|co se týká)\b/i.test(si));
            return shifts.length > 0 ? [shifts.length + '×'] : [];
        }},
        { id: 'zamena_roli', name: 'Záměna rolí', weight: 0.6, detect: (t) => {
            const hasI = /\b(já|jsem|mě|mi|můj|moje|my|nás)\b/i.test(t);
            const hasThey = /\b(on|ona|ono|oni|jej|jeho|její)\b/i.test(t);
            return hasI && hasThey ? ['já ↔ on'] : [];
        }},
        { id: 'rozpad_syntaxe', name: 'Rozpad syntaxe', weight: 0.9, detect: (t, s) => {
            const broken = s.filter(si => si.split(/\s+/).length <= 2 && si.length > 5 && !/[.!?]$/.test(si.trim()));
            return broken.length > 0 ? [broken.length + '×'] : [];
        }},
        { id: 'emocni_zlom', name: 'Emocionální zlom', weight: 0.7, detect: (t, s) => {
            const lens = s.map(si => si.split(/\s+/).length);
            let zlom = false;
            for(let i=2; i<lens.length; i++) {
                if(lens[i] > lens[i-1]*2.5 || lens[i] < lens[i-1]/2.5) { zlom = true; break; }
            }
            return zlom ? ['náhlá změna délky vět'] : [];
        }},
        { id: 'prazdna_slova', name: 'Prázdná slova', weight: 0.3, detect: (t) => {
            const fillers = (t.match(/\b(jakoby|prostě|vlastně|no|že jo|víš co|jako)\b/gi)||[]).length;
            return fillers >= 3 ? [fillers + '×'] : [];
        }},
        { id: 'cizi_teleso', name: 'Cizí těleso', weight: 0.7, detect: (t, s) => {
            const odd = s.filter(si => si.length > 10 && !/[.!?]$/.test(si.trim()) && /\b(mám rád|mám ráda|oblíbený|oblíbená|miluji|nesnáším)\b/i.test(si));
            return odd.length > 0 ? [odd.length + '×'] : [];
        }},
        { id: 'ticho_mezera', name: 'Ticho / mezera', weight: 0.9, detect: (t) => {
            const gaps = (t.match(/\(mlčí\)|\(ticho\)|\(pauza\)|—/gi)||[]).length;
            return gaps > 0 ? [gaps + '×'] : [];
        }}
    ];

    // ============================================================
    // 2. P R O F I L Y  (postavené na Myších klíčích)
    // ============================================================
    const PROFILES = [
        {
            name: 'Předem připravená výpověď',
            desc: 'Text působí jako naučený — opakování frází, minimum přirozených vad.',
            criteria: { opakovani: {min:1.5, w:2}, pretrzeni: {max:0.2, w:2}, prazdna_slova: {max:0.5, w:1}, rozpad_syntaxe: {max:0.5, w:1} },
            forenzni: 'Výpověď pravděpodobně předem připravená. V mluveném projevu podezřelé.'
        },
        {
            name: 'Spontánní, nepřipravený projev',
            desc: 'Přirozený tok řeči s váháním, opravami a krátkými větami.',
            criteria: { prazdna_slova: {min:1.5, w:2}, rozpad_syntaxe: {min:1, w:1.5}, pretrzeni: {min:0.8, w:1.5}, opakovani: {max:0.8, w:1} },
            forenzni: 'Autentický projev, může být stresovaný, ale nepřipravený.'
        },
        {
            name: 'Vyhýbání se odpovědnosti',
            desc: 'Popírání, vynechávání podmětu, opakování — snaha distancovat se.',
            criteria: { pretrzeni: {min:1, w:2}, opakovani: {min:1.5, w:2}, zamena_roli: {min:0.5, w:2}, posun_kontextu: {min:0.8, w:1.5} },
            forenzni: 'Možné klamání nebo snaha se distancovat. Zvláštní pozornost.'
        },
        {
            name: 'Nestabilní perspektiva',
            desc: 'Svědek přepíná mezi vlastní zkušeností a doslechem, mění role.',
            criteria: { zamena_roli: {min:0.5, w:2.5}, preskok: {min:0.8, w:2}, posun_kontextu: {min:0.8, w:1.5} },
            forenzni: 'Svědek nestabilně přepíná perspektivu — možná popisuje cizí zážitek.'
        },
        {
            name: 'Emoční přetlak',
            desc: 'Emocionálně nabitá výpověď s nadsázkou, gradací a zlomy.',
            criteria: { emocni_zlom: {min:0.5, w:2.5}, opakovani: {min:1, w:1.5}, prazdna_slova: {min:1, w:1}, rozpad_syntaxe: {min:0.8, w:1} },
            forenzni: 'Může být autentické trauma, ale i stylizace.'
        },
        {
            name: 'Zaseknutí (fixace)',
            desc: 'Opakování stejných slov, neschopnost posunout se dále.',
            criteria: { fixace: {min:2, w:3}, opakovani: {min:2, w:2} },
            forenzni: 'Stres, zahlcování, nebo úmyslné zdůraznění.'
        },
        {
            name: 'Přehnaná konkrétnost',
            desc: 'Nepřirozeně mnoho detailů — čísla, vlastní jména, přesné časy.',
            criteria: { opakovani: {min:2, w:1.5} },
            customCheck: (t) => {
                const numbers = (t.match(/\b\d+\b/g)||[]).length;
                const proper = (t.match(/\b[A-ZÁČĎÉĚÍŇÓŘŠŤŮÚÝŽ][a-záčďéěíňóřšťůúýž]+\b/g)||[]).length;
                const words = t.split(/\s+/).length;
                const ratio = ((numbers+proper)/Math.max(words,1))*100;
                return ratio > 8 ? {active:true, strength:Math.min(3, ratio/4)} : {active:false, strength:0};
            },
            forenzni: 'Často známka naučené výpovědi.'
        }
    ];

    function splitSentences(text) {
        return text.split(/(?<=[.!?…])\s+|(?<=…)\s*|\n(?=\S)/).map(s=>s.trim()).filter(s=>s.length>1);
    }

    function detectKeys(text) {
        const sentences = splitSentences(text);
        const words = text.toLowerCase().split(/\s+/).map(w=>w.replace(/[.,!?;:]/g,''));
        const results = {};
        MOUSE_KEYS.forEach(key => {
            const hits = key.detect(text, sentences, words);
            const per100 = (hits.length / Math.max(words.length,1)) * 100;
            results[key.id] = { name: key.name, weight: key.weight, hits, per100 };
        });
        return { results, sentences, words };
    }

    function evaluateProfiles(text, keyResults, sentences) {
        return PROFILES.map(prof => {
            if (prof.customCheck) {
                const res = prof.customCheck(text);
                return {
                    ...prof,
                    active: res.active,
                    confidence: res.strength >= 2.5 ? 'high' : res.strength >= 1.2 ? 'medium' : 'low',
                    strength: res.strength,
                    explanation: `Síla detekce: ${res.strength.toFixed(1)}/3.`
                };
            }
            let totalW = 0, satW = 0;
            Object.entries(prof.criteria).forEach(([kid, cfg]) => {
                const val = keyResults[kid]?.per100 || 0;
                totalW += cfg.w;
                if ((cfg.min !== undefined && val >= cfg.min) || (cfg.max !== undefined && val <= cfg.max)) satW += cfg.w;
            });
            const ratio = totalW > 0 ? satW / totalW : 0;
            let active = false, confidence = 'low', strength = 0;
            if (ratio >= 0.8) { active = true; strength = 3; confidence = 'high'; }
            else if (ratio >= 0.6) { active = true; strength = 2; confidence = 'medium'; }
            else if (ratio >= 0.4) { active = true; strength = 1; confidence = 'low'; }
            return {
                ...prof,
                active, confidence, strength,
                explanation: `Splněno ${satW.toFixed(0)} z ${totalW.toFixed(0)} vážených kritérií.`
            };
        });
    }

    function render() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) { alert('Vložte text.'); return; }

        const { results: keyRes, sentences, words } = detectKeys(text);
        const profiles = evaluateProfiles(text, keyRes, sentences);

        // Shrnutí Myších klíčů
        const activeKeys = Object.entries(keyRes).filter(([k,v])=>v.hits.length>0);
        document.getElementById('figureSummary').innerHTML = `
            <strong>Myší klíče detekované v textu</strong><br>
            ${activeKeys.length ? activeKeys.map(([k,v])=>`${v.name}: ${v.hits.join(', ')} (${v.per100.toFixed(1)}/100 slov)`).join('<br>') : 'Žádný z 12 Myších klíčů nebyl detekován.'}
        `;

        // Profily
        document.getElementById('profileGrid').innerHTML = profiles.map(p => `
            <div class="profile-card ${p.active ? 'active' : ''}">
                <div class="profile-name">
                    ${p.name} ${p.active ? '<span class="warning-icon">⚠️</span>' : ''}
                    <span class="confidence ${p.active ? 'confidence-'+p.confidence : ''}" style="margin-left:auto;">
                        ${p.active ? (p.confidence==='high'?'vysoká jistota':p.confidence==='medium'?'střední jistota':'nízká jistota') : 'neaktivní'}
                    </span>
                </div>
                <div class="profile-desc">${p.desc}</div>
                <div class="profile-desc" style="color:var(--accent-light); font-style:italic;">${p.forenzni}</div>
                ${p.active ? `<div style="font-size:0.7rem; margin-top:0.4rem;">🔍 ${p.explanation}</div>` : ''}
            </div>
        `).join('');

        // Varování
        const high = profiles.filter(p=>p.active && p.confidence==='high');
        const medium = profiles.filter(p=>p.active && p.confidence==='medium');
        let warn = '';
        if (high.length) warn += `<div class="warning-box" style="background:#2a2020; border-left:4px solid var(--accent);"><strong>⚠️ Vysoké varování</strong><br>Profily: ${high.map(p=>p.name).join(', ')}.</div>`;
        if (medium.length) warn += `<div class="warning-box" style="background:#282420; border-left:4px solid #b88;"><strong>⚡ Střední varování</strong><br>Profily: ${medium.map(p=>p.name).join(', ')}.</div>`;
        if (!high.length && !medium.length) warn = `<div class="warning-box" style="background:#1e2a1e;">✅ Bez výrazného profilu — text nevykazuje významné odchylky.</div>`;
        document.getElementById('warningMsg').innerHTML = warn;
        document.getElementById('resultsPanel').style.display = 'block';
    }

    document.getElementById('analyzeBtn').addEventListener('click', render);
    document.getElementById('clearBtn').addEventListener('click', ()=>{
        document.getElementById('inputText').value = '';
        document.getElementById('resultsPanel').style.display = 'none';
    });
</script>
</body>
</html>
